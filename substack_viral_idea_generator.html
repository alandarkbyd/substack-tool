
<h2 class="sr-only">Substack Viral Post Idea Generator — trending topics থেকে full post plan তৈরি করে</h2>

<div style="padding: 1.5rem 0;">
  <div style="margin-bottom: 1.5rem;">
    <p style="font-size: 13px; color: var(--color-text-secondary); margin: 0 0 8px;">তোমার Substack niche বলো</p>
    <div style="display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 12px;" id="niche-chips">
      <button onclick="selectNiche(this,'AI & Technology')" style="font-size: 13px; padding: 6px 14px; border-radius: 20px; border: 0.5px solid var(--color-border-secondary); background: var(--color-background-primary); cursor: pointer; color: var(--color-text-primary);">AI & Technology</button>
      <button onclick="selectNiche(this,'Personal Finance')" style="font-size: 13px; padding: 6px 14px; border-radius: 20px; border: 0.5px solid var(--color-border-secondary); background: var(--color-background-primary); cursor: pointer; color: var(--color-text-primary);">Personal Finance</button>
      <button onclick="selectNiche(this,'Self Improvement')" style="font-size: 13px; padding: 6px 14px; border-radius: 20px; border: 0.5px solid var(--color-border-secondary); background: var(--color-background-primary); cursor: pointer; color: var(--color-text-primary);">Self Improvement</button>
      <button onclick="selectNiche(this,'Freelancing')" style="font-size: 13px; padding: 6px 14px; border-radius: 20px; border: 0.5px solid var(--color-border-secondary); background: var(--color-background-primary); cursor: pointer; color: var(--color-text-primary);">Freelancing</button>
      <button onclick="selectNiche(this,'Productivity')" style="font-size: 13px; padding: 6px 14px; border-radius: 20px; border: 0.5px solid var(--color-border-secondary); background: var(--color-background-primary); cursor: pointer; color: var(--color-text-primary);">Productivity</button>
      <button onclick="selectNiche(this,'Startup & Business')" style="font-size: 13px; padding: 6px 14px; border-radius: 20px; border: 0.5px solid var(--color-border-secondary); background: var(--color-background-primary); cursor: pointer; color: var(--color-text-primary);">Startup & Business</button>
    </div>
    <input type="text" id="custom-niche" placeholder="অথবা নিজে লেখো..." style="width: 100%; box-sizing: border-box; font-size: 14px; padding: 10px 14px; border-radius: var(--border-radius-md); border: 0.5px solid var(--color-border-secondary); background: var(--color-background-primary); color: var(--color-text-primary);">
  </div>

  <div style="margin-bottom: 1.5rem;">
    <p style="font-size: 13px; color: var(--color-text-secondary); margin: 0 0 8px;">Target audience</p>
    <div style="display: flex; gap: 8px; flex-wrap: wrap;" id="audience-chips">
      <button onclick="selectAudience(this,'Bangladeshi readers')" style="font-size: 13px; padding: 6px 14px; border-radius: 20px; border: 0.5px solid var(--color-border-secondary); background: var(--color-background-primary); cursor: pointer; color: var(--color-text-primary);">Bangladeshi readers</button>
      <button onclick="selectAudience(this,'Global English readers')" style="font-size: 13px; padding: 6px 14px; border-radius: 20px; border: 0.5px solid var(--color-border-secondary); background: var(--color-background-primary); cursor: pointer; color: var(--color-text-primary);">Global English readers</button>
      <button onclick="selectAudience(this,'Students')" style="font-size: 13px; padding: 6px 14px; border-radius: 20px; border: 0.5px solid var(--color-border-secondary); background: var(--color-background-primary); cursor: pointer; color: var(--color-text-primary);">Students</button>
      <button onclick="selectAudience(this,'Freelancers')" style="font-size: 13px; padding: 6px 14px; border-radius: 20px; border: 0.5px solid var(--color-border-secondary); background: var(--color-background-primary); cursor: pointer; color: var(--color-text-primary);">Freelancers</button>
    </div>
  </div>

  <div style="margin-bottom: 1.5rem;">
    <p style="font-size: 13px; color: var(--color-text-secondary); margin: 0 0 8px;">Post format</p>
    <div style="display: flex; gap: 8px; flex-wrap: wrap;" id="format-chips">
      <button onclick="selectFormat(this,'Listicle (5 things...)')" style="font-size: 13px; padding: 6px 14px; border-radius: 20px; border: 0.5px solid var(--color-border-secondary); background: var(--color-background-primary); cursor: pointer; color: var(--color-text-primary);">Listicle</button>
      <button onclick="selectFormat(this,'Opinion / Hot take')" style="font-size: 13px; padding: 6px 14px; border-radius: 20px; border: 0.5px solid var(--color-border-secondary); background: var(--color-background-primary); cursor: pointer; color: var(--color-text-primary);">Opinion / Hot take</button>
      <button onclick="selectFormat(this,'How-to guide')" style="font-size: 13px; padding: 6px 14px; border-radius: 20px; border: 0.5px solid var(--color-border-secondary); background: var(--color-background-primary); cursor: pointer; color: var(--color-text-primary);">How-to guide</button>
      <button onclick="selectFormat(this,'Story + lesson')" style="font-size: 13px; padding: 6px 14px; border-radius: 20px; border: 0.5px solid var(--color-border-secondary); background: var(--color-background-primary); cursor: pointer; color: var(--color-text-primary);">Story + lesson</button>
      <button onclick="selectFormat(this,'Case study')" style="font-size: 13px; padding: 6px 14px; border-radius: 20px; border: 0.5px solid var(--color-border-secondary); background: var(--color-background-primary); cursor: pointer; color: var(--color-text-primary);">Case study</button>
    </div>
  </div>

  <button onclick="generateIdeas()" style="width: 100%; padding: 12px; font-size: 15px; font-weight: 500; border-radius: var(--border-radius-md); border: 0.5px solid var(--color-border-secondary); background: var(--color-background-primary); cursor: pointer; color: var(--color-text-primary);" id="gen-btn">
    5টি Viral Post Idea Generate করো ↗
  </button>

  <div id="loading" style="display:none; text-align:center; padding: 2rem; color: var(--color-text-secondary); font-size: 14px;">
    <div id="loading-dots">AI trending topics analyze করছে</div>
  </div>

  <div id="results" style="margin-top: 1.5rem;"></div>
</div>

<style>
.chip-selected { background: var(--color-background-info) !important; color: var(--color-text-info) !important; border-color: var(--color-border-info) !important; }
.idea-card { background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); padding: 1.25rem; margin-bottom: 1rem; }
.idea-card:hover { border-color: var(--color-border-secondary); }
.idea-num { font-size: 11px; font-weight: 500; color: var(--color-text-info); background: var(--color-background-info); padding: 2px 8px; border-radius: 20px; display: inline-block; margin-bottom: 8px; }
.idea-title { font-size: 15px; font-weight: 500; color: var(--color-text-primary); margin: 0 0 6px; }
.idea-why { font-size: 13px; color: var(--color-text-secondary); margin: 0 0 10px; line-height: 1.6; }
.section-label { font-size: 11px; font-weight: 500; color: var(--color-text-tertiary); text-transform: uppercase; letter-spacing: 0.05em; margin: 10px 0 4px; }
.expand-btn { font-size: 13px; color: var(--color-text-info); background: none; border: none; cursor: pointer; padding: 0; margin-top: 8px; }
.full-plan { display: none; border-top: 0.5px solid var(--color-border-tertiary); margin-top: 12px; padding-top: 12px; }
.plan-section { margin-bottom: 10px; }
.plan-text { font-size: 13px; color: var(--color-text-secondary); line-height: 1.7; margin: 0; }
.viral-badge { font-size: 11px; padding: 2px 8px; border-radius: 20px; background: var(--color-background-success); color: var(--color-text-success); display: inline-block; margin-left: 6px; }
</style>

<script>
let selectedNiche = '';
let selectedAudience = 'Global English readers';
let selectedFormat = 'Listicle (5 things...)';

function selectNiche(el, val) {
  document.querySelectorAll('#niche-chips button').forEach(b => b.classList.remove('chip-selected'));
  el.classList.add('chip-selected');
  selectedNiche = val;
  document.getElementById('custom-niche').value = '';
}
function selectAudience(el, val) {
  document.querySelectorAll('#audience-chips button').forEach(b => b.classList.remove('chip-selected'));
  el.classList.add('chip-selected');
  selectedAudience = val;
}
function selectFormat(el, val) {
  document.querySelectorAll('#format-chips button').forEach(b => b.classList.remove('chip-selected'));
  el.classList.add('chip-selected');
  selectedFormat = val;
}

function togglePlan(id) {
  const el = document.getElementById('plan-'+id);
  const btn = document.getElementById('btn-'+id);
  if (el.style.display === 'none') {
    el.style.display = 'block';
    btn.textContent = 'Hide full plan ▲';
  } else {
    el.style.display = 'none';
    btn.textContent = 'Full post plan দেখো ▼';
  }
}

async function generateIdeas() {
  const customNiche = document.getElementById('custom-niche').value.trim();
  const niche = customNiche || selectedNiche;
  if (!niche) { alert('একটা niche বেছে নাও বা লেখো!'); return; }

  document.getElementById('gen-btn').disabled = true;
  document.getElementById('gen-btn').textContent = 'Generating...';
  document.getElementById('loading').style.display = 'block';
  document.getElementById('results').innerHTML = '';

  const dots = ['AI trending topics analyze করছে', 'Substack top posts research করছে', 'Viral patterns খুঁজছে', 'তোমার post plan তৈরি করছে'];
  let di = 0;
  const dotInterval = setInterval(() => {
    di = (di+1) % dots.length;
    const loadEl = document.getElementById('loading-dots');
    if (loadEl) loadEl.textContent = dots[di];
  }, 1800);

  const systemPrompt = `You are a viral content strategist for Substack. Generate exactly 5 viral post ideas for a Substack newsletter. 

Niche: ${niche}
Target audience: ${selectedAudience}
Preferred format: ${selectedFormat}

Respond ONLY with a valid JSON array, no markdown, no backticks, no preamble. Format:
[
  {
    "id": 1,
    "title": "Compelling post title",
    "trendReason": "Why this is trending now (1-2 sentences)",
    "viralScore": 85,
    "hook": "Opening hook sentence that grabs attention",
    "structure": ["Section 1 heading", "Section 2 heading", "Section 3 heading", "Section 4 heading", "Section 5 heading"],
    "keyPoints": ["Key insight 1", "Key insight 2", "Key insight 3"],
    "coverImageIdea": "Specific description of what cover image to create or find",
    "cta": "Call to action at end of post",
    "writingTips": "2-3 specific writing tips for this exact post"
  }
]`;

  try {
    const resp = await fetch('/.netlify/functions/claude' {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        tools: [{ type: 'web_search_20250305', name: 'web_search' }],
        system: systemPrompt,
        messages: [{ role: 'user', content: `Find what is currently trending and viral on Substack and Google for the niche: "${niche}". Then generate 5 viral post ideas based on those trends for ${selectedAudience}. Return only JSON.` }]
      })
    });

    const data = await resp.json();
    clearInterval(dotInterval);
    document.getElementById('loading').style.display = 'none';
    document.getElementById('gen-btn').disabled = false;
    document.getElementById('gen-btn').textContent = '5টি Viral Post Idea Generate করো ↗';

    let rawText = '';
    for (const block of data.content) {
      if (block.type === 'text') rawText += block.text;
    }

    const cleaned = rawText.replace(/```json|```/g, '').trim();
    const jsonStart = cleaned.indexOf('[');
    const jsonEnd = cleaned.lastIndexOf(']') + 1;
    const ideas = JSON.parse(cleaned.slice(jsonStart, jsonEnd));

    renderIdeas(ideas);
  } catch(err) {
    clearInterval(dotInterval);
    document.getElementById('loading').style.display = 'none';
    document.getElementById('gen-btn').disabled = false;
    document.getElementById('gen-btn').textContent = '5টি Viral Post Idea Generate করো ↗';
    document.getElementById('results').innerHTML = '<p style="color:var(--color-text-danger);font-size:14px;">কিছু একটা সমস্যা হয়েছে। আবার চেষ্টা করো।</p>';
  }
}

function renderIdeas(ideas) {
  const container = document.getElementById('results');
  container.innerHTML = '<p style="font-size:13px;color:var(--color-text-secondary);margin:0 0 1rem;">এই সপ্তাহের trending topics থেকে তৈরি তোমার 5টি viral post idea:</p>';

  ideas.forEach((idea, i) => {
    const score = idea.viralScore || 80;
    const card = document.createElement('div');
    card.className = 'idea-card';
    card.innerHTML = `
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;">
        <span class="idea-num">Idea #${idea.id || i+1}</span>
        <span style="font-size:12px;color:var(--color-text-secondary);">Viral score: <strong style="color:var(--color-text-success)">${score}/100</strong></span>
      </div>
      <p class="idea-title">${idea.title}</p>
      <p class="idea-why">${idea.trendReason}</p>
      <div style="background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:10px 12px;margin-bottom:8px;">
        <p class="section-label">Opening hook</p>
        <p class="plan-text" style="font-style:italic;">"${idea.hook}"</p>
      </div>
      <button class="expand-btn" id="btn-${i}" onclick="togglePlan(${i})">Full post plan দেখো ▼</button>
      <div class="full-plan" id="plan-${i}">
        <div class="plan-section">
          <p class="section-label">Post structure</p>
          ${(idea.structure||[]).map((s,j) => `<p class="plan-text" style="margin:2px 0;">&#x2713; ${s}</p>`).join('')}
        </div>
        <div class="plan-section">
          <p class="section-label">Key insights to include</p>
          ${(idea.keyPoints||[]).map(k => `<p class="plan-text" style="margin:2px 0;">&#x2022; ${k}</p>`).join('')}
        </div>
        <div class="plan-section">
          <p class="section-label">Cover image idea</p>
          <p class="plan-text">${idea.coverImageIdea}</p>
        </div>
        <div class="plan-section">
          <p class="section-label">Call to action</p>
          <p class="plan-text">${idea.cta}</p>
        </div>
        <div class="plan-section">
          <p class="section-label">Writing tips</p>
          <p class="plan-text">${idea.writingTips}</p>
        </div>
        <button onclick="sendPrompt('এই Substack post idea টার জন্য সম্পূর্ণ post লিখে দাও: ${idea.title.replace(/'/g,"")}')" style="margin-top:10px;font-size:13px;width:100%;padding:10px;border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-secondary);background:var(--color-background-primary);cursor:pointer;color:var(--color-text-primary);">
          এই post টা লিখে দাও ↗
        </button>
      </div>
    `;
    container.appendChild(card);
  });
}
</script>
